AWSTemplateFormatVersion: "2010-09-09"
Transform: "AWS::Serverless-2016-10-31"
Description: "Digital Identity IPR OIDC Stub"

Parameters:
  KmsPendingWindowInDays:
    Type: Number
    Description: Number of days to retain KMS in pending deletion state when deleted
    Default: 30
  CodeSigningConfigArn:
    Type: String
    Default: "none"
    Description: >
      The ARN of the Code Signing Config to use, provided by the deployment pipeline
  Environment:
    Description: "The environment type"
    Type: "String"
    AllowedValues:
      - "dev"
      - "build"
    ConstraintDescription: Ensure environment variable is set to one of dev, build.
  PermissionsBoundary:
    Description: "The ARN of the permissions boundary to apply when creating IAM roles"
    Type: String
    Default: "none"
  VpcStackName:
    Type: String
    Default: "vpc-cri"
    Description: The name of the VPC stack deployed.
  JwksUri:
    Type: String
    Default: "none"
    Description: The primary stack jwks uri.
Mappings:
  EnvironmentConfiguration: # This is where you store per-environment settings.
    dev:
      logretentionindays: 3
      apiTracingEnabled: true
    build:
      logretentionindays: 3
      apiTracingEnabled: true

  EnvironmentVariables: # This is all the environment specific environment variables that don't belong in globals.
    dev:
      OIDCSTUBDNS: "oidcstub.return.dev.account.gov.uk"
      JWKSURI: "https://ipvreturn-api.return.dev.account.gov.uk/.well-known/interim-jwks.json"
      OIDCURL: "https://ipr-oidc-stub-oidcstub.return.dev.account.gov.uk/"
      REDIRECTURI: "https://ipvreturn-front.return.dev.account.gov.uk/callback" 
    build:
      OIDCSTUBDNS: "oidcstub.return.build.account.gov.uk"
      JWKSURI: "https://ipvreturn-api.return.build.account.gov.uk/.well-known/interim-jwks.json"
      OIDCURL: "https://ipr-oidc-stub-oidcstub.return.build.account.gov.uk/" 
      REDIRECTURI: "https://return.build.account.gov.uk/callback" 

Conditions:
  CreateDevResources: !Equals
    - !Ref Environment
    - dev
  UseCodeSigning:
    Fn::Not:
      - Fn::Equals:
          - !Ref CodeSigningConfigArn
          - "none"
  UsePermissionsBoundary:
    Fn::Not:
      - Fn::Equals:
          - !Ref PermissionsBoundary
          - "none"
  JwksSet:
    Fn::Not:
      - Fn::Equals:
          - !Ref JwksUri
          - "none"
Globals:
  Api:
    BinaryMediaTypes:
      - '*/*'
  Function:
    Runtime: nodejs22.x
    VpcConfig:
      SecurityGroupIds:
        - !GetAtt LambdaEgressSecurityGroup.GroupId
      SubnetIds:
        - Fn::ImportValue:
            "Fn::Sub": "${VpcStackName}-ProtectedSubnetIdA"
        - Fn::ImportValue:
            "Fn::Sub": "${VpcStackName}-ProtectedSubnetIdB"
    PermissionsBoundary: !If
      - UsePermissionsBoundary
      - !Ref PermissionsBoundary
      - !Ref AWS::NoValue
    CodeSigningConfigArn: !If
      - UseCodeSigning
      - !Ref CodeSigningConfigArn
      - !Ref AWS::NoValue
    Timeout: 30 # seconds
    Tracing: Active
    MemorySize: 1024
    Architectures:
      - arm64
    Environment:
      Variables:
        AWS_STACK_NAME: !Sub ${AWS::StackName}
        POWERTOOLS_LOG_LEVEL: "DEBUG"
        POWERTOOLS_METRICS_NAMESPACE: "IPR-CRI"
    AutoPublishAlias: live

Resources:
  LambdaEgressSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: >-
        Permits outbound on port 443 from within the VPC to the internet.
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          Description: Allow to the wider internet on port 443
          FromPort: 443
          IpProtocol: tcp
          ToPort: 443
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-VpcId"

  ### Start of API Gateway definition.

  MockOidcRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      OpenApiVersion: 3.0.2
      AccessLogSetting:
        Format: "$context.requestId $context.httpMethod $context.path"
        DestinationArn: !GetAtt MockOidcAPIGatewayAccessLogGroup.Arn
      EndpointConfiguration:
        Type: REGIONAL
      DefinitionBody:
        ## workaround as https://github.com/aws/serverless-application-model/blob/14d0563e5f48adbb0d1ff1c807ca3eeb17adc3d8/samtranslator/swagger/swagger.py#L65
        ## won't allow BinaryMediaTypes with external openapi sppec file
        openapi: '3.0.2'
        paths:
          /myMethod:
            post:
              produces:
                - "application/json"
              responses: { }

        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: './oidc-spec.yaml'

      TracingEnabled: true
      Tags:
        Product: GOV.UK Sign In
        System: OidcMock
        Environment: !Ref Environment
        Service: backend
        Name: MockOidcRestApi
        Source: oidc
        FMSRegionalPolicy: false
        CustomPolicy: true


  MockOidcRestApiUsagePlan:
     DependsOn:
       - "MockOidcRestApiStage"
     Type: AWS::ApiGateway::UsagePlan
     Properties:
       ApiStages:
         - ApiId: !Ref MockOidcRestApi
           Stage: !Ref Environment
       Quota:
         Limit: 250000
         Period: DAY
       Throttle:
         BurstLimit: 3000 # requests the API can handle concurrently
         RateLimit: 50 # allowed requests per second

  MockOidcAPIGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays:
        !FindInMap [
          EnvironmentConfiguration,
          !Ref Environment,
          logretentionindays,
        ]
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Oidc
        - Key: Environment
          Value: Demo
        - Key: Service
          Value: backend
        - Key: Name
          Value: APIGatewayAccessLogGroup

  ### End of API Gateway definition.

  ### OIDC Provider Function
  MockOidcProviderFunction:
    Type: AWS::Serverless::Function
    DependsOn: MockOidcProviderFunctionLogGroup
    Properties:
      FunctionName: !Sub "OidcProvider-Stub-${AWS::StackName}"
      Handler: MockOidcProviderHandler.handler
      CodeUri: ./src
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: MockOidcProviderHandler
          OIDC_CLIENT_ID: !Sub "{{resolve:ssm:/${Environment}/ipvreturn/CLIENT_ID}}"
          REDIRECT_URI: !FindInMap [ EnvironmentVariables, !Ref Environment, REDIRECTURI ]
          ISSUER: !Ref MockOidcApiGatewayCustomDomain
          JWKS_URI: !If
            - JwksSet
            - !Ref JwksUri
            - !FindInMap [ EnvironmentVariables, !Ref Environment, JWKSURI ]
          DEBUG: oidc-provider:*
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSXrayWriteOnlyAccess
    Metadata:
      BuildMethod: makefile
      BuildProperties:
        Minify: true
        Target: "es2020"
        format: cjs
        Sourcemap: true
        EntryPoints:
          - MockOidcProviderHandler.ts
        Loader:
          - .ejs=copy
        UseNpmCi: True

  MockOidcProviderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/OidcProvider-Stub-${AWS::StackName}"
      RetentionInDays: !FindInMap [ EnvironmentConfiguration, !Ref Environment, logretentionindays ]

  MockOidcProviderFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      FunctionName: !Ref MockOidcProviderFunction.Alias
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MockOidcRestApi}/*/*/*

  MockOidcApiGatewayCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !If
        - CreateDevResources
        - !Sub
          - "${AWS::StackName}-${OIDCSTUBDNS}"
          - OIDCSTUBDNS:
              !FindInMap [ EnvironmentVariables, !Ref Environment, OIDCSTUBDNS ]
        - !FindInMap [ EnvironmentVariables, !Ref Environment, OIDCSTUBDNS ]
      DomainNameConfigurations:
        - CertificateArn: !Sub "{{resolve:ssm:/${Environment}/Platform/ACM/PrimaryZoneWildcardCertificateARN}}"
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  MockOidcApiDomainRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      Name: !Ref MockOidcApiGatewayCustomDomain
      Type: A
      HostedZoneId: !Sub "{{resolve:ssm:/${Environment}/Platform/Route53/PrimaryZoneID}}"
      AliasTarget:
        DNSName: !GetAtt MockOidcApiGatewayCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt MockOidcApiGatewayCustomDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

  #Base Path Mapping
  MockOidcApiBasePathMapping:
    Type: 'AWS::ApiGateway::BasePathMapping'
    Properties:
      DomainName: !Ref MockOidcApiGatewayCustomDomain
      RestApiId: !Ref MockOidcRestApi

      # workaround for sam bug - see https://github.com/aws/serverless-application-model/issues/192#issuecomment-520893111
      # noinspection YamlUnresolvedReferences
      Stage: !Ref MockOidcRestApi.Stage

Outputs:
  MockOidcApiGatewayId:
    Description: "API GatewayID of the Oidc API"
    Value: !Sub "${MockOidcRestApi}"
    Export:
      Name: !Sub ${AWS::StackName}-MockOidcApiGatewayId
